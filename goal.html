  <script>
    const spots = {
      arc: {

          "建議安排：香榭麗舍大道、夏佑宮夜景、塞納河散步。",
          "適合主題：城市攝影、歷史導覽、初訪巴黎。",
          "推薦時段：黃昏前後，城市光線最有層次。"
        ],
        date: "推薦行程｜8 月 20 日、9 月 3 日、10 月 2 日",
        image: "https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&w=900&q=80",
        alt: "凱旋門"
      },
      louvre: {
        title: "羅浮宮",
        lead: "從王宮到世界級博物館，羅浮宮收藏橫跨古文明與歐洲藝術史。小法旅以主題路線帶你避開迷路感，聚焦真正想看的作品。",
        list: [
          "建議安排：玻璃金字塔、黎塞留翼、杜樂麗花園。",
          "適合主題：藝術史、策展觀察、經典館藏。",
          "推薦時段：平日上午或夜間開館日。"
        ],
        date: "推薦行程｜8 月 20 日、9 月 10 日、10 月 7 日",
        image: "https://images.unsplash.com/photo-1499856871958-5b9627545d1a?auto=format&fit=crop&w=900&q=80",
        alt: "羅浮宮玻璃金字塔"
      },
      eiffel: {
        title: "艾菲爾鐵塔",
        lead: "巴黎最具辨識度的城市符號，白天適合從戰神廣場散步取景，夜晚則能在河岸看見鐵塔閃燈。",
        list: [
          "建議安排：戰神廣場、夏佑宮、塞納河遊船。",
          "適合主題：城市漫遊、攝影、浪漫紀念日。",
          "推薦時段：日落前一小時抵達最佳。"
        ],
        date: "推薦行程｜9 月 3 日、9 月 26 日、11 月 5 日",
        image: "https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=900&q=80",
        alt: "艾菲爾鐵塔"
      },
      mont: {
        title: "聖米歇爾山",
        lead: "位在諾曼第潮汐灘上的修道院小島，隨潮水變化呈現截然不同的景色，是法國最夢幻的世界遺產之一。",
        list: [
          "建議安排：修道院導覽、潮汐步道、諾曼第小鎮。",
          "適合主題：世界遺產、建築美學、自然景觀。",
          "推薦時段：配合潮汐表規劃一日或二日行程。"
        ],
        date: "推薦行程｜10 月 7 日、10 月 21 日、11 月 5 日",
        image: "https://images.unsplash.com/photo-1518129364064-04266b5ca8e4?auto=format&fit=crop&w=900&q=80",
        alt: "聖米歇爾山"
      }
    };

    const title = document.querySelector("#spotTitle");
    const lead = document.querySelector("#spotLead");
    const list = document.querySelector("#spotList");
    const date = document.querySelector("#spotDate");
    const photo = document.querySelector("#spotPhoto");
    const tabs = document.querySelectorAll(".spot-tab");
    const markers = document.querySelectorAll(".landmark-btn");

    function setSpot(key) {
      const spot = spots[key];
      title.textContent = spot.title;
      lead.textContent = spot.lead;
      list.innerHTML = spot.list.map((item) => `<li>${item}</li>`).join("");
      date.textContent = spot.date;
      photo.src = spot.image;
      photo.alt = spot.alt;

      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.spot === key));
      markers.forEach((marker) => marker.classList.toggle("active", marker.dataset.spot === key));
    }

    [...tabs, ...markers].forEach((control) => {
      control.addEventListener("click", () => setSpot(control.dataset.spot));
      control.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          setSpot(control.dataset.spot);
        }
      });
    });


  </script>
